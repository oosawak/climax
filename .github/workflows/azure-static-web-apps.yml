name: Azure Static Web Apps (admin-web)

on:
  push:
    branches: [main]
    paths:
      - "admin-web/**"
      - "api/chronicle-functions-python/**"
      - ".github/workflows/azure-static-web-apps.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - "admin-web/**"
      - "api/chronicle-functions-python/**"
      - ".github/workflows/azure-static-web-apps.yml"

concurrency:
  group: swa-gray-island
  cancel-in-progress: true

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Set this secret after creating a Static Web App:
          # GitHub repo -> Settings -> Secrets and variables -> Actions
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_ISLAND_0D9F03C0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "admin-web"
          api_location: "api/chronicle-functions-python"
          output_location: ""

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR
    steps:
      - name: Close PR
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_ISLAND_0D9F03C0F }}
          action: close

